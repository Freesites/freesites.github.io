<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeSites Portal &mdash; Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ================================================================
       RESET & BASE
    ================================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:     #0f172a;
      --navy-2:   #1e293b;
      --indigo:   #4f46e5;
      --indigo-l: #6366f1;
      --green:    #16a34a;
      --red:      #dc2626;
      --bg:       #f8fafc;
      --border:   #e2e8f0;
      --text:     #0f172a;
      --muted:    #64748b;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;

      /* Subtle radial gradient on background */
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(79,70,229,.07) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(249,115,22,.06) 0%, transparent 50%);
    }

    /* ================================================================
       HEADER LOGO (above card)
    ================================================================ */
    .page-logo {
      font-size: 22px;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.02em;
      text-decoration: none;
      margin-bottom: 28px;
    }
    .page-logo span { color: var(--indigo-l); }

    /* ================================================================
       CARD
    ================================================================ */
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.1);
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
    }

    /* Card icon at top */
    .card-icon-wrap {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--indigo) 0%, var(--indigo-l) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 4px 12px rgba(79,70,229,.3);
    }
    .card-icon-wrap svg { color: #fff; }

    h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    p.sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* ================================================================
       FORM
    ================================================================ */
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 7px;
    }

    input[type="email"] {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: #fff;
    }
    input[type="email"]:focus {
      border-color: var(--indigo);
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }

    button[type="submit"] {
      position: relative;
      overflow: hidden;
      width: 100%;
      margin-top: 18px;
      padding: 13px;
      background: linear-gradient(135deg, var(--indigo) 0%, var(--indigo-l) 100%);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.15s;
      box-shadow: 0 4px 14px rgba(79,70,229,.4);
      letter-spacing: -0.01em;
    }
    button[type="submit"]::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; bottom: 0;
      width: 60%;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,.2) 50%, transparent 60%);
      transition: left 0.5s;
    }
    button[type="submit"]:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(79,70,229,.45);
    }
    button[type="submit"]:hover:not(:disabled)::after { left: 150%; }
    button[type="submit"]:active:not(:disabled) { transform: translateY(0); }
    button[type="submit"]:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* ================================================================
       MESSAGE
    ================================================================ */
    .message {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
      display: none;
      align-items: flex-start;
      gap: 10px;
    }
    .message svg { flex-shrink: 0; margin-top: 1px; }
    .message.success { background: #dcfce7; color: #15803d; display: flex; }
    .message.error   { background: #fee2e2; color: var(--red); display: flex; }
    .message.show    { display: flex; }

    /* ================================================================
       BACK LINK
    ================================================================ */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 28px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--indigo); }

    /* ================================================================
       FOOTER
    ================================================================ */
    .page-footer {
      margin-top: 32px;
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
    }
    .page-footer a { color: #94a3b8; text-decoration: none; }
    .page-footer a:hover { color: var(--muted); }

    /* ================================================================
       RESPONSIVE
    ================================================================ */
    @media (max-width: 480px) {
      .card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <a href="/" class="page-logo">Free<span>Sites</span></a>

  <div class="card">
    <div class="card-icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    </div>

    <h1>Sign in to your portal</h1>
    <p class="sub">Enter your email address and we&rsquo;ll send you a magic sign&#8209;in link.</p>

    <form id="login-form">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      <button type="submit" id="submit-btn">Send sign-in link &rarr;</button>
    </form>

    <div class="message" id="message"></div>
  </div>

  <a href="/" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back to FreeSites
  </a>

  <div class="page-footer">
    <p>&copy; 2025 FreeSites &middot; <a href="mailto:support@freesites.io">support@freesites.io</a></p>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      if (params.get('error') === 'expired') {
        showMessage('Your sign-in link has expired. Enter your email to request a new one.', 'error');
      } else if (params.get('error') === 'invalid') {
        showMessage('That sign-in link is not valid. Enter your email to request a new one.', 'error');
      }

      document.getElementById('login-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'Sending...';

        try {
          const res = await fetch('/api/portal/request-link', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });
          if (res.ok) {
            document.getElementById('login-form').style.display = 'none';
            showMessage('Check your email — a sign-in link is on its way. It expires in 15 minutes.', 'success');
          } else {
            btn.disabled = false;
            btn.textContent = 'Send sign-in link';
            showMessage('Something went wrong. Please try again.', 'error');
          }
        } catch (_) {
          btn.disabled = false;
          btn.textContent = 'Send sign-in link';
          showMessage('Could not connect. Please check your internet connection and try again.', 'error');
        }
      });

      function showMessage(text, type) {
        const el = document.getElementById('message');
        el.textContent = text;
        el.className = 'message ' + type + ' show';
      }
    })();
  </script>
</body>
</html>
