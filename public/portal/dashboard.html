<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeSites Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ================================================================
       RESET & BASE
    ================================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:     #0f172a;
      --navy-2:   #1e293b;
      --indigo:   #4f46e5;
      --indigo-l: #6366f1;
      --orange:   #f97316;
      --green:    #16a34a;
      --red:      #dc2626;
      --bg:       #f8fafc;
      --border:   #e2e8f0;
      --text:     #0f172a;
      --muted:    #64748b;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ================================================================
       HEADER
    ================================================================ */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--navy);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      box-shadow: 0 1px 0 rgba(255,255,255,.06);
    }

    .logo {
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--indigo-l); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #biz-name {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,.65);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #logout-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,.3);
      color: rgba(255,255,255,.8);
      border-radius: 7px;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    #logout-btn:hover {
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.5);
      color: #fff;
    }

    /* ================================================================
       MAIN
    ================================================================ */
    main {
      max-width: 700px;
      margin: 36px auto;
      padding: 0 16px 80px;
    }

    /* ================================================================
       CARDS
    ================================================================ */
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      padding: 28px 32px;
      margin-bottom: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .card-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--indigo) 0%, var(--indigo-l) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-icon svg { color: #fff; }

    .card h2 {
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ================================================================
       STATUS BADGES
    ================================================================ */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 13px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-badge::before {
      content: '';
      display: block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .status-deployed  { background: #dcfce7; color: #15803d; }
    .status-deployed::before  { background: #16a34a; }

    .status-building  { background: #fff7ed; color: #c2410c; }
    .status-building::before  { background: #f97316; animation: blink 1.2s ease-in-out infinite; }

    .status-failed    { background: #fee2e2; color: var(--red); }
    .status-failed::before    { background: var(--red); }

    .status-pending   { background: #eff6ff; color: #1d4ed8; }
    .status-pending::before   { background: #3b82f6; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .site-url {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      color: var(--indigo);
      font-weight: 600;
      font-size: 15px;
      word-break: break-all;
      text-decoration: none;
    }
    .site-url:hover { text-decoration: underline; }

    /* ================================================================
       ACCOUNT DL
    ================================================================ */
    dl {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 10px 16px;
      font-size: 14px;
    }
    dt { color: var(--muted); font-weight: 500; }
    dd { font-weight: 600; color: var(--navy); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      color: #92400e;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    /* ================================================================
       CHANGE REQUEST FORM
    ================================================================ */
    #change-intro {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      resize: vertical;
      min-height: 110px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      line-height: 1.6;
    }
    textarea:focus {
      border-color: var(--indigo);
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }
    textarea:disabled {
      background: #f8fafc;
      color: #94a3b8;
      cursor: not-allowed;
    }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
    }
    .char-count.over { color: var(--red); }

    button.primary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 11px 22px;
      background: linear-gradient(135deg, var(--indigo) 0%, var(--indigo-l) 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 12px rgba(79,70,229,.3);
    }
    button.primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(79,70,229,.4);
    }
    button.primary:active:not(:disabled) { transform: translateY(0); }
    button.primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
      background: #94a3b8;
    }

    /* ================================================================
       INLINE MESSAGES
    ================================================================ */
    .inline-msg {
      margin-top: 12px;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
      align-items: flex-start;
      gap: 8px;
    }
    .inline-msg.success { background: #dcfce7; color: #15803d; display: flex; }
    .inline-msg.error   { background: #fee2e2; color: var(--red); display: flex; }
    .inline-msg.info    { background: #eff6ff; color: #1d4ed8; display: flex; }

    /* ================================================================
       LAST NOTE
    ================================================================ */
    .last-note {
      font-size: 14px;
      color: var(--muted);
      margin-top: 16px;
      padding: 12px 16px;
      background: #f8fafc;
      border-radius: 8px;
      border-left: 3px solid var(--border);
      line-height: 1.6;
    }
    .last-note strong {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
      margin-bottom: 5px;
    }

    /* ================================================================
       LOADING STATE
    ================================================================ */
    #loading {
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
    }

    .loading-dots {
      display: inline-flex;
      gap: 6px;
      margin-bottom: 16px;
    }
    .loading-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--indigo);
      animation: dot-bounce 1.3s ease-in-out infinite;
      opacity: 0.3;
    }
    .loading-dots span:nth-child(1) { animation-delay: 0s; }
    .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes dot-bounce {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.9); }
      40%            { opacity: 1;   transform: scale(1.15); }
    }

    .loading-text {
      font-size: 15px;
      font-weight: 500;
      color: var(--muted);
    }

    #content { display: none; }

    /* ================================================================
       FOOTER
    ================================================================ */
    footer {
      background: var(--navy-2);
      color: rgba(255,255,255,.5);
      text-align: center;
      padding: 24px 20px;
      font-size: 13px;
    }
    footer a { color: rgba(255,255,255,.6); text-decoration: none; }
    footer a:hover { color: #fff; }

    /* ================================================================
       RESPONSIVE
    ================================================================ */
    @media (max-width: 480px) {
      header { padding: 0 16px; }
      .card { padding: 20px 16px; }
      dl { grid-template-columns: 1fr; gap: 6px; }
      dt { margin-top: 8px; }
      dt:first-child { margin-top: 0; }
    }
  </style>
</head>
<body>

  <!-- ================================================================
       HEADER
  ================================================================ -->
  <header>
    <a href="/" class="logo">Free<span>Sites</span></a>
    <div class="header-right">
      <span id="biz-name"></span>
      <button id="logout-btn">Sign Out</button>
    </div>
  </header>

  <!-- ================================================================
       MAIN
  ================================================================ -->
  <main>
    <div id="loading">
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
      <div class="loading-text">Loading your portal&hellip;</div>
    </div>

    <div id="content">

      <!-- Site Status Card -->
      <div class="card" id="status-card">
        <div class="card-header">
          <div class="card-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <h2>Your Website</h2>
        </div>
        <div id="status-area"></div>
      </div>

      <!-- Account Details Card -->
      <div class="card">
        <div class="card-header">
          <div class="card-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <h2>Account</h2>
        </div>
        <dl id="account-dl"></dl>
      </div>

      <!-- Change Request Card -->
      <div class="card">
        <div class="card-header">
          <div class="card-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </div>
          <h2>Request a Change</h2>
        </div>
        <p id="change-intro">
          Describe what you'd like to update on your site. Our AI will rebuild it with your changes.
        </p>
        <textarea id="change-note" placeholder="e.g. Update our phone number to 555-123-4567, or add a section about our free estimates offer." maxlength="2000"></textarea>
        <div class="char-count"><span id="char-display">0</span> / 2000</div>
        <button class="primary" id="submit-change" disabled>Submit Change Request</button>
        <div class="inline-msg" id="change-msg"></div>
        <div class="last-note" id="last-note" style="display:none">
          <strong>Last request</strong>
          <span id="last-note-text"></span>
        </div>
      </div>

    </div>
  </main>

  <!-- ================================================================
       FOOTER
  ================================================================ -->
  <footer>
    <p>&copy; 2025 FreeSites &middot; All rights reserved &middot; <a href="mailto:support@freesites.io">support@freesites.io</a></p>
  </footer>

  <script>
    (function () {
      let dashboardData = null;

      // ---------------------------------------------------------------------------
      // Fetch dashboard data
      // ---------------------------------------------------------------------------
      async function load() {
        try {
          const res = await fetch('/api/portal/dashboard', { credentials: 'same-origin' });
          if (res.status === 401) {
            location.href = '/portal/login.html';
            return;
          }
          if (!res.ok) {
            document.getElementById('loading').innerHTML = '<div class="loading-text">Failed to load your portal. Please refresh.</div>';
            return;
          }
          dashboardData = await res.json();
          render(dashboardData);
        } catch (_) {
          document.getElementById('loading').innerHTML = '<div class="loading-text">Could not connect. Please refresh the page.</div>';
        }
      }

      // ---------------------------------------------------------------------------
      // Render dashboard
      // ---------------------------------------------------------------------------
      function render(d) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        document.getElementById('biz-name').textContent = d.businessName;
        document.title = d.businessName + ' — FreeSites Portal';

        renderStatus(d);
        renderAccount(d);
        renderChangeForm(d);

        // Auto-refresh while generating
        if (d.isGenerating) {
          setTimeout(load, 30000);
        }
      }

      function renderStatus(d) {
        const el = document.getElementById('status-area');
        let html = '';

        if (d.deploymentStatus === 'deployed' && d.deployedUrl) {
          html += '<span class="status-badge status-deployed">Live</span>';
          html += '<br><a class="site-url" href="' + esc(d.deployedUrl) + '" target="_blank" rel="noopener">' + esc(d.deployedUrl) + ' <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>';
          if (d.lastDeployedAt) {
            html += '<p style="font-size:13px;color:var(--muted);margin-top:10px">Last updated: ' + formatDate(d.lastDeployedAt) + '</p>';
          }
        } else if (d.isGenerating) {
          html += '<span class="status-badge status-building">Building</span>';
          html += '<p style="font-size:14px;color:var(--muted);margin-top:12px;line-height:1.6">Your site is being built — this usually takes 1–2 minutes. This page will refresh automatically.</p>';
        } else if (d.deploymentStatus === 'failed') {
          html += '<span class="status-badge status-failed">Build failed</span>';
          html += '<p style="font-size:14px;color:var(--muted);margin-top:12px;line-height:1.6">We hit a snag building your site. Our team has been notified. Use the form below to re-submit your request.</p>';
        } else {
          html += '<span class="status-badge status-pending">Setting up</span>';
          html += '<p style="font-size:14px;color:var(--muted);margin-top:12px;line-height:1.6">Your site is being set up. Check back shortly.</p>';
        }

        el.innerHTML = html;
      }

      function renderAccount(d) {
        const dl = document.getElementById('account-dl');
        const rows = [
          ['Plan', capitalize(d.planTier)],
          ['Member since', d.activatedAt ? formatDate(d.activatedAt) : '—'],
          ['Founding Member', d.isFounderMember ? '<span class="badge">&#11088; Yes</span>' : 'No'],
        ];
        dl.innerHTML = rows.map(([k, v]) => '<dt>' + esc(k) + '</dt><dd>' + v + '</dd>').join('');
      }

      function renderChangeForm(d) {
        const textarea = document.getElementById('change-note');
        const btn = document.getElementById('submit-change');
        const intro = document.getElementById('change-intro');
        const msgEl = document.getElementById('change-msg');

        if (d.isGenerating) {
          textarea.disabled = true;
          btn.disabled = true;
          showMsg(msgEl, 'A generation is in progress. The form will unlock when it completes.', 'info');
        } else if (d.deploymentStatus === 'deployed' || d.deploymentStatus === 'failed') {
          textarea.disabled = false;
          textarea.addEventListener('input', function () {
            const len = textarea.value.length;
            const counter = document.getElementById('char-display');
            counter.textContent = len;
            counter.parentElement.className = 'char-count' + (len > 2000 ? ' over' : '');
            btn.disabled = len === 0 || len > 2000;
          });
        } else {
          textarea.disabled = true;
          btn.disabled = true;
          intro.textContent = 'Change requests will be available once your site is live.';
        }

        if (d.lastChangeNote) {
          document.getElementById('last-note').style.display = 'block';
          document.getElementById('last-note-text').textContent = d.lastChangeNote;
        }
      }

      // ---------------------------------------------------------------------------
      // Submit change request
      // ---------------------------------------------------------------------------
      document.getElementById('submit-change').addEventListener('click', async function () {
        const note = document.getElementById('change-note').value.trim();
        const btn = document.getElementById('submit-change');
        const msgEl = document.getElementById('change-msg');
        if (!note) return;

        btn.disabled = true;
        btn.textContent = 'Submitting...';
        hideMsg(msgEl);

        try {
          const res = await fetch('/api/portal/change-request', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ note }),
          });

          if (res.status === 401) {
            location.href = '/portal/login.html';
            return;
          }

          if (res.status === 409) {
            const data = await res.json();
            showMsg(msgEl, data.error, 'error');
            btn.disabled = false;
            btn.textContent = 'Submit Change Request';
            return;
          }

          if (res.ok) {
            showMsg(msgEl, 'Change request submitted! Your site is being rebuilt.', 'success');
            document.getElementById('change-note').value = '';
            document.getElementById('char-display').textContent = '0';
            btn.textContent = 'Submit Change Request';
            // Reload data to show building state
            setTimeout(load, 2000);
          } else {
            showMsg(msgEl, 'Something went wrong. Please try again.', 'error');
            btn.disabled = false;
            btn.textContent = 'Submit Change Request';
          }
        } catch (_) {
          showMsg(msgEl, 'Could not connect. Please try again.', 'error');
          btn.disabled = false;
          btn.textContent = 'Submit Change Request';
        }
      });

      // ---------------------------------------------------------------------------
      // Logout
      // ---------------------------------------------------------------------------
      document.getElementById('logout-btn').addEventListener('click', async function () {
        await fetch('/api/portal/logout', { method: 'POST', credentials: 'same-origin' });
        location.href = '/portal/login.html';
      });

      // ---------------------------------------------------------------------------
      // Utilities
      // ---------------------------------------------------------------------------
      function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
      function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
      function formatDate(iso) {
        try { return new Date(iso).toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' }); }
        catch(_) { return iso; }
      }
      function showMsg(el, text, type) {
        el.textContent = text;
        el.className = 'inline-msg ' + type;
      }
      function hideMsg(el) {
        el.className = 'inline-msg';
        el.textContent = '';
      }

      load();
    })();
  </script>
</body>
</html>
